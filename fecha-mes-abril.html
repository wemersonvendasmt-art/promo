<style>

:root {

--green: #16a34a;

--green-light: #22c55e;

--green-dark: #14532d;

--yellow: #facc15;

--dark: #0a0f0a;

--dark2: #111811;

--dark3: #1a2e1a;

--card: #0f1f0f;

--border: #1f3d1f;

--text: #e8f5e9;

--muted: #6b9e6b;

}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(22,163,74,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(250,204,21,0.04) 0%, transparent 50%); pointer-events: none; z-index: 0; }

/* ── HEADER ── */

header { background: linear-gradient(135deg, #0a1a0a 0%, #0f2d0f 50%, #0a1a0a 100%); border-bottom: 2px solid var(--green); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }

.header-inner { max-width: 1400px; margin: auto; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }

.logo-coagro { height: 48px; filter: drop-shadow(0 0 8px rgba(22,163,74,0.6)); }

.logo-selo { height: 72px; filter: drop-shadow(0 0 12px rgba(250,204,21,0.5)); animation: pulse-glow 2s ease-in-out infinite; }

@keyframes pulse-glow { 0%,100%{filter:drop-shadow(0 0 12px rgba(250,204,21,0.5));} 50%{filter:drop-shadow(0 0 24px rgba(250,204,21,0.9));} }

/* ── COUNTDOWN BANNER ── */

#countdown-banner { background: linear-gradient(90deg, var(--green-dark), #1a3d1a, var(--green-dark)); border-bottom: 1px solid var(--green); padding: 10px 24px; text-align: center; }

.status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 18px; border-radius: 999px; font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; }

.status-waiting { background: rgba(250,204,21,0.15); border: 1px solid var(--yellow); color: var(--yellow); }

.status-active { background: rgba(22,163,74,0.2); border: 1px solid var(--green-light); color: var(--green-light); animation: blink 1.5s ease-in-out infinite; }

.status-ended { background: rgba(220,38,38,0.15); border: 1px solid #ef4444; color: #ef4444; }

@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.6;} }

.countdown-units { display: flex; justify-content: center; gap: 16px; margin-top: 8px; flex-wrap: wrap; }

.cunit { text-align: center; }

.cunit span { display: block; font-size: 2rem; font-weight: 900; color: var(--green-light); line-height: 1; text-shadow: 0 0 12px rgba(34,197,94,0.5); }

.cunit small { font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

/* ── HERO ── */

.hero { max-width: 1400px; margin: 32px auto 0; padding: 0 24px; text-align: center; }

.hero h1 { font-size: clamp(1.8rem, 5vw, 3.5rem); font-weight: 900; background: linear-gradient(135deg, var(--green-light), var(--yellow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; }

.hero p { color: var(--muted); margin-top: 8px; font-size: 1rem; }

/* ── FILTERS ── */

.filters-wrap { max-width: 1400px; margin: 28px auto 0; padding: 0 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

.filter-btn { padding: 8px 20px; border-radius: 999px; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; letter-spacing: 0.5px; }

.filter-btn:hover, .filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; box-shadow: 0 0 16px rgba(22,163,74,0.4); }

.search-box { margin-left: auto; display: flex; align-items: center; gap: 8px; background: var(--card); border: 1.5px solid var(--border); border-radius: 999px; padding: 8px 16px; }

.search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 0.9rem; width: 200px; }

.search-box input::placeholder { color: var(--muted); }

/* ── GRID ── */

.products-grid { max-width: 1400px; margin: 24px auto 80px; padding: 0 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

/* ── CARD ── */

.card { background: linear-gradient(145deg, var(--card), #0d1a0d); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 12px; transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; }

.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--green), var(--yellow)); }

.card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(22,163,74,0.2); }

.card-dept { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--green-light); }

.card-code { font-size: 0.7rem; color: var(--muted); }

.card-name { font-size: 0.95rem; font-weight: 700; color: var(--text); line-height: 1.3; }

.card-tag { font-size: 0.7rem; background: rgba(22,163,74,0.15); border: 1px solid var(--green); color: var(--green-light); padding: 2px 8px; border-radius: 4px; display: inline-block; }

.price-from { font-size: 0.8rem; color: var(--muted); text-decoration: line-through; }

.price-to { font-size: 1.6rem; font-weight: 900; color: var(--green-light); text-shadow: 0 0 12px rgba(34,197,94,0.3); }

.price-margin { font-size: 0.75rem; color: var(--yellow); font-weight: 600; }

.price-pay { font-size: 0.75rem; color: var(--muted); }

.btn-wpp { display: flex; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 0.85rem; font-weight: 700; cursor: pointer; text-decoration: none; transition: all 0.2s; margin-top: auto; }

.btn-wpp:hover { background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 4px 20px rgba(22,163,74,0.5); transform: scale(1.02); }

.btn-wpp svg { width: 18px; height: 18px; }

/* ── FOOTER ── */

footer { text-align: center; padding: 24px; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; }

.hidden { display: none !important; }

</style>

</head>

// COUNTDOWN + STATUS

// ═══════════════════════════════════════════════════════════

const START = new Date('2026-04-28T00:00:00');

const END = new Date('2026-04-30T23:59:59');

function pad(n){ return String(n).padStart(2,'0'); }

function updateCountdown(){

const now = new Date();

const label = document.getElementById('status-label');

const units = document.getElementById('countdown-units');

if(now < START){

const diff = START - now;

const d = Math.floor(diff/86400000);

const h = Math.floor((diff%86400000)/3600000);

const m = Math.floor((diff%3600000)/60000);

const s = Math.floor((diff%60000)/1000);

label.innerHTML = '<span class="status-badge status-waiting">⏳ AGUARDANDO INÍCIO</span>';

units.innerHTML = `<div class='cunit'><span>${pad(d)}</span><small>Dias</small></div><div class='cunit'><span>${pad(h)}</span><small>Horas</small></div><div class='cunit'><span>${pad(m)}</span><small>Min</small></div><div class='cunit'><span>${pad(s)}</span><small>Seg</small></div>`;

} else if(now >= START && now <= END){

const diff = END - now;

const h = Math.floor(diff/3600000);

const m = Math.floor((diff%3600000)/60000);

const s = Math.floor((diff%60000)/1000);

label.innerHTML = '<span class="status-badge status-active">🟢 PROMOÇÃO ATIVADA — CORRE QUE TÁ ACABANDO!</span>';

units.innerHTML = `<div class='cunit'><span>${pad(h)}</span><small>Horas</small></div><div class='cunit'><span>${pad(m)}</span><small>Min</small></div><div class='cunit'><span>${pad(s)}</span><small>Seg</small></div>`;

} else {

label.innerHTML = '<span class="status-badge status-ended">🔴 CAMPANHA ENCERRADA</span>';

units.innerHTML = '<p style="color:#6b9e6b;font-size:0.85rem;">Esta promoção foi encerrada em 30/04/2026. Fique atento às próximas!</p>';

}

}

setInterval(updateCountdown, 1000);

return 'https://wa.me/?text='+encodeURIComponent(msg);

}

function renderCards(list){

}).join('');

// ═══════════════════════════════════════════════════════════

// FILTROS E BUSCA

// ═══════════════════════════════════════════════════════════

let activeDept = 'todos';

function applyFilters(){

const q = document.getElementById('search-input').value.toLowerCase().trim();

let filtered = products;

if(activeDept !== 'todos') filtered = filtered.filter(p => p.dept === activeDept);

if(q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || String(p.id).includes(q));

renderCards(filtered);

}

document.querySelectorAll('.filter-btn').forEach(btn => {

btn.addEventListener('click', () => {

document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

btn.classList.add('active');

activeDept = btn.dataset.dept;

applyFilters();

});

});

document.getElementById('search-input').addEventListener('input', applyFilters);

renderCards(products);
